<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h1> Lista de tareas </h1>
    <form id="task-form">
      <input type="text" id="task-input" placeholder="agrega una nueva tarea" required>
      <button type="submit">Agrega una nueva tarea</button>
    </form>
    <ul id="task-list"></ul>
    <div class="counter">
      <p id="task-count">Tareas pendientes: 0</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
